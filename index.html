<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body>
  <h2 class="sr-only">Dream11 Tracker — IPL 2026 fantasy cricket leaderboard for friends</h2>
  <style>
    :root {
      --font-sans: 'Outfit', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;

      --color-bg-body: #0B0E14;
      --color-bg-card: rgba(22, 27, 34, 0.6);
      --color-bg-card-hover: rgba(30, 36, 45, 0.8);
      --color-bg-secondary: rgba(255, 255, 255, 0.05);
      --color-bg-secondary-hover: rgba(255, 255, 255, 0.1);

      --color-border: rgba(255, 255, 255, 0.1);
      --color-border-focus: rgba(255, 179, 71, 0.5);

      --color-text-primary: #F3F4F6;
      --color-text-secondary: #9CA3AF;
      --color-text-muted: #6B7280;

      --color-accent: #FFB347;
      --color-accent-hover: #FFC069;
      --color-accent-glow: rgba(255, 179, 71, 0.3);

      --color-success: #10B981;
      --color-success-bg: rgba(16, 185, 129, 0.15);
      --color-pending: #F59E0B;
      --color-pending-bg: rgba(245, 158, 11, 0.15);
      --color-danger: #EF4444;

      --color-rank-1: #FFD700;
      --color-rank-2: #E0E0E0;
      --color-rank-3: #CD7F32;

      --border-radius-sm: 6px;
      --border-radius-md: 10px;
      --border-radius-lg: 16px;
      --border-radius-full: 9999px;

      --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -2px rgba(0, 0, 0, 0.15);
      --shadow-glow: 0 0 15px var(--color-accent-glow);
    }

    body {
      background-color: var(--color-bg-body);
      background-image:
        radial-gradient(circle at 15% 50%, rgba(255, 179, 71, 0.08), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.08), transparent 25%);
      background-attachment: fixed;
      color: var(--color-text-primary);
      min-height: 100vh;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    #app {
      font-family: var(--font-sans);
      padding: 2rem 1rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
    }

    .tabs {
      display: flex;
      gap: 0.5rem;
      background: rgba(0, 0, 0, 0.2);
      padding: 0.35rem;
      border-radius: var(--border-radius-full);
      margin-bottom: 2rem;
      border: 1px solid var(--color-border);
      backdrop-filter: blur(10px);
    }

    .tab {
      flex: 1;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--color-text-secondary);
      border-radius: var(--border-radius-full);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: var(--font-sans);
    }

    .tab.on {
      color: #111827;
      background: var(--color-accent);
      box-shadow: 0 2px 10px var(--color-accent-glow);
    }

    .tab:hover:not(.on) {
      color: var(--color-text-primary);
      background: var(--color-bg-secondary);
    }

    .view {
      display: none;
      animation: fadeIn 0.4s ease forwards;
    }

    .view.on {
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(5px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--border-radius-lg);
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow-sm);
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      border-color: rgba(255, 255, 255, 0.2);
      box-shadow: var(--shadow-md);
    }

    .two-col {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 1.25rem;
      margin-bottom: 0.5rem;
    }

    @media (max-width: 500px) {
      .two-col {
        grid-template-columns: 1fr;
      }
    }

    .sec-label {
      font-size: 15px;
      font-weight: 600;
      color: var(--color-text-primary);
      margin-bottom: 1rem;
      letter-spacing: -0.01em;
      display: flex;
      align-items: center;
    }

    .sec-sub {
      font-size: 12px;
      color: var(--color-text-secondary);
      font-weight: 400;
      margin-left: 8px;
      background: var(--color-bg-secondary);
      padding: 2px 8px;
      border-radius: var(--border-radius-full);
    }

    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin: 0 -0.5rem;
      padding: 0 0.5rem;
    }

    .heatmap-grid {
      display: grid;
      grid-auto-flow: column;
      gap: 4px;
      overflow-x: auto;
      padding: 8px 0;
      align-items: stretch;
    }

    .heatmap-cell {
      min-width: 44px;
      text-align: center;
      padding: 8px 6px;
      font-size: 12px;
      border-radius: 8px;
      color: #f8fafc;
      background: #111;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .heatmap-cell.head {
      background: rgba(255,255,255,0.08);
      font-weight: 700;
      color: var(--color-text-primary);
      position: sticky;
      top: 0;
      z-index: 2;
    }

    .heatmap-cell.player {
      position: sticky;
      left: 0;
      z-index: 1;
      background: rgba(255,255,255,0.05);
      font-weight: 600;
      color: var(--color-text-primary);
    }

    table {
      width: 100%;
      min-width: 1000px;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 14px;
    }

    th {
      text-align: left;
      padding: 10px 8px;
      font-size: 11px;
      font-weight: 600;
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--color-border);
      white-space: nowrap;
    }

    td {
      padding: 12px 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      color: var(--color-text-primary);
      white-space: nowrap;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background: rgba(255, 255, 255, 0.02);
    }

    .pos {
      font-size: 13px;
      font-weight: 700;
      color: var(--color-text-secondary);
      text-align: center;
      background: var(--color-bg-secondary);
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }

    .pos.p1 {
      color: #000;
      background: var(--color-rank-1);
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
    }

    .pos.p2 {
      color: #000;
      background: var(--color-rank-2);
      box-shadow: 0 0 8px rgba(224, 224, 224, 0.3);
    }

    .pos.p3 {
      color: #000;
      background: var(--color-rank-3);
      box-shadow: 0 0 8px rgba(205, 127, 50, 0.3);
    }

    .pname {
      font-weight: 500;
      font-size: 14px;
    }

    .num {
      font-family: var(--font-mono);
      font-size: 14px;
      text-align: right;
      font-weight: 600;
      overflow: visible;
      text-overflow: clip;
    }

    .match-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid var(--color-border);
      transition: background 0.2s ease;
    }

    .match-row:last-child {
      border-bottom: none;
    }

    .match-row:hover {
      background: rgba(255, 255, 255, 0.02);
      border-radius: var(--border-radius-md);
      padding-left: 8px;
      padding-right: 8px;
      margin-left: -8px;
      margin-right: -8px;
    }

    .mnum {
      font-size: 12px;
      font-weight: 600;
      color: var(--color-accent);
      background: var(--color-accent-glow);
      padding: 3px 8px;
      border-radius: var(--border-radius-sm);
      flex-shrink: 0;
      font-family: var(--font-mono);
    }

    .mteams {
      font-weight: 600;
      font-size: 15px;
      letter-spacing: -0.01em;
    }

    .mmeta {
      font-size: 12px;
      color: var(--color-text-secondary);
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: var(--border-radius-full);
      flex-shrink: 0;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .b-done {
      background: var(--color-success-bg);
      color: var(--color-success);
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .b-pend {
      background: var(--color-pending-bg);
      color: var(--color-pending);
      border: 1px solid rgba(245, 158, 11, 0.2);
    }

    .btn {
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--color-border);
      border-radius: var(--border-radius-md);
      background: var(--color-bg-secondary);
      color: var(--color-text-primary);
      font-family: var(--font-sans);
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn:hover {
      background: var(--color-bg-secondary-hover);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-a {
      background: var(--color-accent);
      color: #111827;
      border-color: var(--color-accent);
      font-weight: 600;
      box-shadow: 0 4px 12px var(--color-accent-glow);
    }

    .btn-a:hover {
      background: var(--color-accent-hover);
      color: #000;
      border-color: var(--color-accent-hover);
      box-shadow: 0 6px 16px var(--color-accent-glow);
      transform: translateY(-1px);
    }

    .btn-sm {
      padding: 5px 12px;
      font-size: 13px;
      border-radius: var(--border-radius-sm);
    }

    .back {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: var(--color-text-secondary);
      font-family: var(--font-sans);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 1.5rem;
      padding: 6px 12px;
      border-radius: var(--border-radius-full);
      transition: all 0.2s ease;
      margin-left: -12px;
    }

    .back:hover {
      color: var(--color-text-primary);
      background: var(--color-bg-secondary);
    }

    .entry-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: var(--border-radius-md);
      margin-bottom: 8px;
      transition: border-color 0.2s;
    }

    .entry-row:hover {
      border-color: rgba(255, 255, 255, 0.1);
    }

    .ep {
      flex: 1;
      font-weight: 500;
      font-size: 14px;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .eig {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .el {
      font-size: 11px;
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }

    input[type=number],
    input[type=text] {
      width: 80px;
      font-family: var(--font-mono);
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      color: var(--color-text-primary);
      border-radius: var(--border-radius-sm);
      padding: 8px 10px;
      font-size: 14px;
      transition: all 0.2s ease;
      outline: none;
    }

    input[type=text] {
      width: 100%;
      font-family: var(--font-sans);
    }

    input:focus {
      border-color: var(--color-accent);
      box-shadow: 0 0 0 2px var(--color-accent-glow);
      background: rgba(0, 0, 0, 0.3);
    }

    .pl-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--color-border);
    }

    .pl-row:last-of-type {
      border-bottom: none;
    }

    .pl-name {
      font-weight: 600;
      font-size: 15px;
    }

    .pl-meta {
      font-size: 13px;
      color: var(--color-text-secondary);
      margin-top: 4px;
    }

    .add-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--color-border);
    }

    .add-row input {
      flex: 1;
    }

    .del {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-text-muted);
      font-size: 20px;
      line-height: 1;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .del:hover {
      color: var(--color-danger);
      background: rgba(239, 68, 68, 0.1);
    }

    .empty {
      color: var(--color-text-muted);
      font-size: 15px;
      padding: 3rem 1rem;
      text-align: center;
      background: rgba(0, 0, 0, 0.1);
      border-radius: var(--border-radius-md);
      border: 1px dashed var(--color-border);
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .hint {
      font-size: 13px;
      color: var(--color-text-muted);
      margin-top: 1rem;
      text-align: center;
    }

    .loading-state {
      color: var(--color-text-muted);
      font-size: 15px;
      padding: 2rem 0;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .loading-state::after {
      content: "";
      width: 16px;
      height: 16px;
      border: 2px solid var(--color-text-muted);
      border-right-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--color-bg-body);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .app-header {   
      margin-bottom: 2rem;
      text-align: center;
    }

    .app-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--color-text-primary);
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff, #a1a1aa);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .app-subtitle {
      font-size: 14px;
      color: var(--color-accent);
      margin-top: 6px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* Mobile Responsiveness */
    @media (max-width: 600px) {
      #app {
        padding: 1rem 0.5rem;
      }

    const SUPABASE_URL = 'https://ojzrhvngytlrrqstrdkc.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9qenJodm5neXRscnJxc3RyZGtjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NTA3MTUsImV4cCI6MjA5MzAyNjcxNX0.DFgCu7jQckh8Y7hvpFn7HpXR4b8urFIzqcq-jU-rtoE';

    let S = { players: [], matches: [...BASE_MATCHES], entries: {}, view: 'leaderboard', sel: null };

    function escH(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

    async function init() {
      // Initialize supabase client if not already done
      if (!supabaseClient && window.supabase) {
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      }

      if (!supabaseClient || SUPABASE_URL.includes('YOUR_SUPABASE_URL')) {
        render();
        return;
      }

      try {
        const [pRes, mRes, eRes] = await Promise.all([
          supabaseClient.from('players').select('name').order('created_at', { ascending: true }),
          supabaseClient.from('custom_matches').select('*'),
          supabaseClient.from('entries').select('*')
        ]);

        if (pRes.data) S.players = pRes.data.map(p => p.name);

        if (mRes.data && mRes.data.length) {
          const extras = mRes.data.map(m => ({ id: m.id, t: m.teams, d: m.match_date, v: m.venue }));
          S.matches = [...BASE_MATCHES, ...extras];
        }

        if (eRes.data) {
          S.entries = {};
          eRes.data.forEach(e => {
            S.entries[eKey(e.match_id, e.player_name)] = { rank: e.rank, points: e.points };
          });
        }
      } catch (e) {
        console.error("Error fetching from Supabase:", e);
      }
      render();
    }

    function eKey(mid, player) { return mid + ':::' + player; }

    function matchEntries(mid) {
      const out = {};
      const prefix = String(mid) + ':::';
      for (const k in S.entries) {
        if (k.startsWith(prefix)) out[k.slice(prefix.length)] = S.entries[k];
      }
      return out;
    }

    function leaderboard() {
      const data = {};
      for (const p of S.players) data[p] = { rs: 0, ps: 0, n: 0 };
      for (const k in S.entries) {
        const sep = k.indexOf(':::');
        if (sep < 0) continue;
        const player = k.slice(sep + 3);
        if (!data[player]) continue;
        const { rank, points } = S.entries[k];
        if (rank != null && rank !== '') { data[player].rs += Number(rank); data[player].n++; }
        if (points != null && points !== '') data[player].ps += Number(points);
      }
      const byR = Object.entries(data).filter(([, v]) => v.n > 0).sort((a, b) => {
        if (a[1].rs !== b[1].rs) return a[1].rs - b[1].rs;
        return b[1].ps - a[1].ps;
      });
      const byP = Object.entries(data).filter(([, v]) => v.n > 0).sort((a, b) => b[1].ps - a[1].ps);
      return { byR, byP, data };
    }

    const XP_TABLE = {
      1: 35,
      2: 25,
      3: 20,
      4: 15,
      5: 12,
      6: 10,
      7: 8,
      8: 5,
    };

    function getXPChange(rank) {
      if (!rank) return 0;
      if (rank <= 8) return XP_TABLE[rank] || 5;
      return -15;
    }

    function computeAdvancedStats() {
      const data = {};

      for (const p of S.players) {
        data[p] = {
          rs: 0,
          ps: 0,
          n: 0,
          points: [],
          ranks: [],
          matches: [],
          podiumCount: 0,
          winCount: 0,
          currentPodiumStreak: 0,
          bestPodiumStreak: 0,
          currentWinStreak: 0,
          bestWinStreak: 0,
          level: 'useless',
          badges: [],
          xp: 0,
          lastXP: 0,
          rival: null,
        };
      }

      for (const k in S.entries) {
        const sep = k.indexOf(':::');
        if (sep < 0) continue;
        const matchId = Number(k.slice(0, sep));
        const player = k.slice(sep + 3);
        const { rank, points } = S.entries[k];

        if (!data[player]) continue;

        const d = data[player];
        if (rank != null && rank !== '') {
          const rankNum = Number(rank);
          const xpChange = getXPChange(rankNum);
          d.xp += xpChange;
          d.lastXP = xpChange;
          d.rs += rankNum;
          d.ranks.push(rankNum);
          d.matches.push({ matchId, rank: rankNum, points: points != null && points !== '' ? Number(points) : null });
          d.n++;
          if (rankNum <= 3) d.podiumCount++;
          if (rankNum === 1) d.winCount++;
        }

        if (points != null && points !== '') {
          d.ps += Number(points);
          d.points.push(Number(points));
        }
      }

      let maxAvgP = 0;
      let minAvgR = Infinity;
      let maxPodium = 0;

      for (const p in data) {
        const d = data[p];
        d.avgP = d.n ? d.ps / d.n : 0;
        d.avgR = d.n ? d.rs / d.n : Infinity;
        d.top3Rate = d.n ? d.podiumCount / d.n : 0;
        d.winRate = d.n ? d.winCount / d.n : 0;
        d.consistency = d.points.length > 1 ? 1 / (1 + variance(d.points)) : 0;
        d.form = d.points.length ? d.points.slice(-3).reduce((sum, value) => sum + value, 0) / Math.min(3, d.points.length) : 0;
        d.matches.sort((a, b) => a.matchId - b.matchId);

        maxAvgP = Math.max(maxAvgP, d.avgP);
        minAvgR = Math.min(minAvgR, d.avgR);
        maxPodium = Math.max(maxPodium, d.podiumCount);
      }

      const allPlayers = Object.keys(data);
      const sortedByScore = [...allPlayers].map(p => {
        const d = data[p];
        const pointsScore = maxAvgP ? d.avgP / maxAvgP : 0;
        const rankScore = d.avgR !== Infinity ? minAvgR / d.avgR : 0;
        d.score = (0.5 * pointsScore) + (0.3 * rankScore) + (0.2 * d.consistency);
        return d.score;
      });

      const maxScore = Math.max(...sortedByScore, 0);
      const totalMatches = Math.max(...Object.values(data).map(x => x.n || 1));
      const dynamicScale = totalMatches * 12;

      for (const p in data) {
        const d = data[p];
        const xpLevel = Math.max(0, Math.floor(d.xp / dynamicScale));
        d.levelNum = xpLevel;
        d.level = getLevelNameFromRank(getRankFromLevel(xpLevel));
        d.rankTitle = d.level;
        d.currentLevelXP = d.levelNum * dynamicScale;
        d.nextLevelXP = (d.levelNum + 1) * dynamicScale;
        d.progress = d.xp - d.currentLevelXP;
        d.progressNeeded = d.nextLevelXP - d.currentLevelXP;
        d.bestStreak = d.winCount;
        d.badges = getBadges(d);
      }

      for (const p of allPlayers) {
        data[p].rival = getClosestRival(p, data);
      }

      return data;
    }

    function getRankFromLevel(level) {
      if (level < 2) return 0;
      if (level < 5) return 1;
      if (level < 8) return 2;
      if (level < 12) return 3;
      if (level < 16) return 4;
      if (level < 20) return 5;
      if (level < 25) return 6;
      if (level < 30) return 7;
      if (level < 35) return 8;
      if (level < 40) return 9;
      if (level < 50) return 10;
      if (level < 60) return 11;
      if (level < 70) return 12;
      if (level < 80) return 13;
      if (level < 90) return 14;
      if (level < 100) return 15;
      return 16;
    }

    function getLevelNameFromRank(rank) {
      const names = [
        'useless',
        'noob',
        'elite noob',
        'slime',
        'goblin',
        'wolf',
        'werewolf',
        'troll',
        'minotaur',
        'ogre',
        'cyclops',
        'wyvern',
        'chimera',
        'vampire',
        'death knight',
        'lich',
        'phoenix',
        'hydra',
        'titan',
        'dragon',
        'angel',
        'demon',
        'seraph',
        'singularity',
        'GAME MASTER',
      ];
      return names[rank] || 'useless';
    }

    function podiumCard(entry, pos, isMain = false) {
      if (!entry) return '';
      const [name, d] = entry;
      return `
  <div class="card-podium ${isMain ? 'main' : ''}">
    <div class="rank-badge">${pos}</div>
    <div class="name">${escH(name)}</div>
    <div class="tier">${escH(d.rankTitle || d.level)}</div>
    <div class="stats">
      <div>Lv ${d.levelNum || 0}</div>
      <div>🔥 x${d.bestStreak || 0}</div>
    </div>
  </div>`;
    }

    function getBadges(d) {
      const badges = [];
      if (d.winCount >= 3) badges.push('Champion');
      if (d.podiumCount >= 5) badges.push('Podium King');
      if (d.top3Rate >= 0.7 && d.n >= 5) badges.push('Podium Streak');
      if (d.consistency >= 0.75 && d.n >= 4) badges.push('Consistency Ace');
      if (d.avgP >= 75 && d.n >= 3) badges.push('High Scorer');
      if (d.n === 0) badges.push('Benchwarmer');
      if (d.n > 0 && d.n <= 2) badges.push('Rising Rookie');
      return badges;
    }

    function getClosestRival(player, data) {
      const d = data[player];
      let best = null;
      let bestDiff = Infinity;
      for (const other in data) {
        if (other === player) continue;
        const diff = Math.abs((d.score || 0) - (data[other].score || 0));
        if (diff < bestDiff) {
          bestDiff = diff;
          best = other;
        }
      }
      return best;
    }

    function showXPFloat(message, positive = true) {
      const bubble = document.createElement('div');
      bubble.className = 'xp-float';
      bubble.textContent = message;
      bubble.style.position = 'fixed';
      bubble.style.left = '50%';
      bubble.style.top = '20%';

      bubble.style.borderRadius = '999px';
      bubble.style.color = '#fff';
      bubble.style.fontWeight = '700';
      bubble.style.zIndex = 9999;
      bubble.style.background = positive ? 'linear-gradient(135deg,#22c55e,#10b981)' : 'linear-gradient(135deg,#ef4444,#f97316)';
      bubble.style.boxShadow = '0 20px 50px rgba(0,0,0,0.18)';
      document.body.appendChild(bubble);
      gsap.fromTo(bubble, { opacity: 0, y: -20 }, { opacity: 1, y: 0, duration: 0.35 });
      gsap.to(bubble, { opacity: 0, y: -40, duration: 0.7, delay: 1.4, onComplete: () => bubble.remove() });
    }

    function showLevelUp(player, level) {
      const bubble = document.createElement('div');
      bubble.className = 'level-up';
      bubble.textContent = `${player} leveled up to ${level.toUpperCase()}!`;
      bubble.style.position = 'fixed';

      bubble.style.bottom = '15%';
      bubble.style.transform = 'translateX(-50%)';
      bubble.style.padding = '16px 20px';
      bubble.style.borderRadius = '18px';
      bubble.style.color = '#111827';
      bubble.style.zIndex = 9999;
      bubble.style.background = 'linear-gradient(135deg,#facc15,#f97316)';
      bubble.style.boxShadow = '0 24px 60px rgba(0,0,0,0.22)';
      document.body.appendChild(bubble);
      gsap.fromTo(bubble, { opacity: 0, scale: 0.85 }, { opacity: 1, scale: 1, duration: 0.45, ease: 'elastic.out(1,0.7)' });
      gsap.to(bubble, { opacity: 0, duration: 0.7, delay: 2, onComplete: () => bubble.remove() });
      celebrate();
    }

    function celebrate() {
      confetti({ particleCount: 50, spread: 70, origin: { y: 0.4 } });
      confetti({ particleCount: 30, spread: 100, origin: { y: 0.6 } });
    }

    function variance(arr) {
      const mean = arr.reduce((a, b) => a + b, 0) / arr.length;
      return arr.reduce((a, b) => a + (b - mean) ** 2, 0) / arr.length;
    }

    function render() {
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('on', t.dataset.v === S.view));
      ['leaderboard', 'matches', 'players', 'entry', 'analytics'].forEach(v => {
        const el = document.getElementById('v-' + v);
        if (el) el.classList.toggle('on', v === S.view);
      });
      if (S.view === 'leaderboard') rLB();
      else if (S.view === 'matches') rMatches();
      else if (S.view === 'players') rPlayers();
      else if (S.view === 'entry') rEntry();
      else if (S.view === 'analytics') rAnalytics();
    }

    function captureLeaderboardPositions() {
      PREV_LEADERBOARD_POSITIONS.clear();
      const rows = document.querySelectorAll('#v-leaderboard .player-row');
      rows.forEach(row => {
        const nameEl = row.querySelector('.pname');
        if (!nameEl) return;
        PREV_LEADERBOARD_POSITIONS.set(nameEl.textContent.trim(), row.getBoundingClientRect().top);
      });
    }

    function animateLeaderboard() {
      const rows = document.querySelectorAll('#v-leaderboard .player-row');
      rows.forEach((row, i) => {
        gsap.fromTo(row,
          { opacity: 0, y: 30 },
          { opacity: 1, y: 0, duration: 0.5, delay: i * 0.05, ease: 'power3.out' }
        );
      });

      const top = document.querySelector('#v-leaderboard .pos.p1');
      if (top) {
        gsap.killTweensOf(top);
        gsap.to(top, {
          scale: 1.15,
          repeat: -1,
          yoyo: true,
          duration: 0.8,
          ease: 'power1.inOut',
        });
      }
    }

    function animateRankSwap() {
      const rows = document.querySelectorAll('#v-leaderboard .player-row');
      rows.forEach(row => {
        const nameEl = row.querySelector('.pname');
        if (!nameEl) return;
        const name = nameEl.textContent.trim();
        const oldTop = PREV_LEADERBOARD_POSITIONS.get(name);
        const newTop = row.getBoundingClientRect().top;
        if (oldTop != null && oldTop !== newTop) {
          const delta = oldTop - newTop;
          gsap.fromTo(row,
            { y: delta },
            { y: 0, duration: 0.6, ease: 'power2.out' }
          );
        }
      });
    }

    function rLB() {
      const el = document.getElementById('v-leaderboard');
      if (!S.players.length) {
        el.innerHTML = `<div class="empty">Add players in the Players tab to get started.</div>`; return;
      }
      captureLeaderboardPositions();
      const data = computeAdvancedStats();
      const sorted = Object.entries(data).sort((a, b) => b[1].score - a[1].score);

      let html = `<div class="card">
        <div class="sec-label">Unified Ranking <span class="sec-sub">weighted: 50% avg points + 30% avg rank + 20% consistency</span></div>
        <div class="table-wrap">
        <table>
        <thead>
          <tr>
            <th style="width:28px">#</th>
            <th>Player</th>
            <th style="text-align:right;width:68px">Level</th>
            <th style="text-align:right;width:64px">Score</th>
            <th style="text-align:right;width:48px">Avg P</th>
            <th style="text-align:right;width:48px">Tot P</th>
            <th style="text-align:right;width:64px">XP Progress</th>
            <th style="text-align:right;width:48px">ΔXP</th>
            <th style="text-align:right;width:56px">Total XP</th>
            <th style="text-align:right;width:48px">Avg R</th>
            <th style="text-align:right;width:48px">Tot R</th>
            <th style="text-align:right;width:32px">M</th>
            <th style="text-align:right;width:32px">Podium</th>
            <th style="text-align:right;width:56px">Cons</th>
          </tr>
        </thead><tbody>`;

      sorted.forEach(([name, d], i) => {
        const pc = i === 0 ? ' p1' : i === 1 ? ' p2' : i === 2 ? ' p3' : '';
        const avgR = d.avgR === Infinity ? '-' : d.avgR.toFixed(2);
        const xpText = d.lastXP > 0 ? `+${d.lastXP}` : `${d.lastXP}`;
        const xpColor = d.lastXP > 0 ? '#10B981' : d.lastXP < 0 ? '#EF4444' : 'var(--color-text-secondary)';
        html += `<tr class="player-row">
          <td><div class="pos${pc}">${i + 1}</div></td>
          <td class="pname" title="${escH(name)}">${escH(name)}</td>
          <td>
            ${escH(d.rankTitle)}
            <div style="height:4px;background:#333;border-radius:4px;margin-top:4px;overflow:hidden;">
              <div style="width:${d.progress && d.progressNeeded ? (d.progress / d.progressNeeded) * 100 : 0}%;height:100%;background:gold;border-radius:4px;"></div>
            </div>
          </td>
          <td class="num">${d.score.toFixed(3)}</td>
          <td class="num">${d.avgP.toFixed(2)}</td>
          <td class="num">${d.ps}</td>
          <td class="num">${d.progress}/${d.progressNeeded}</td>
          <td class="num" style="color:${xpColor}">${xpText}</td>
          <td class="num">${d.xp}</td>
          <td class="num">${avgR}</td>
          <td class="num">${d.rs}</td>
          <td class="num" style="color:var(--color-text-secondary)">${d.n}</td>
          <td class="num" style="color:var(--color-accent)">${d.podiumCount}</td>
          <td class="num">${d.consistency.toFixed(7)}</td>
        </tr>`;
      });

      html += `</tbody></table></div></div>
        <div class="hint">Level based on normalized score. Players with no matches are still shown at the bottom.</div>`;

      el.innerHTML = html;
      if (window.gsap) {
        animateLeaderboard();
        setTimeout(animateRankSwap, 50);
      }
    }

    function rMatches() {
      const el = document.getElementById('v-matches');
      let html = `<div class="top-bar">
    <span style="font-size:13px;color:var(--color-text-secondary)">${S.matches.length} matches</span>
    <button class="btn btn-sm" onclick="addMatch()">+ Add match</button>
  </div><div class="card" style="padding:.5rem 1.25rem">`;
      for (const m of S.matches) {
        const me = matchEntries(m.id);
        const cnt = Object.keys(me).length;
        html += `<div class="match-row">
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span class="mnum">M${m.id}</span>
          <span class="mteams">${escH(m.t)}</span>
        </div>
        <div class="mmeta">${escH(m.d)} · ${escH(m.v)}${cnt ? ` · <span style="color:var(--color-success);font-weight:600">${cnt} entr${cnt === 1 ? 'y' : 'ies'}</span>` : ''}</div>
      </div>
      <div style="display:flex;gap:6px;align-items:center;flex-shrink:0;margin-left:8px">
        <span class="badge ${cnt ? 'b-done' : 'b-pend'}">${cnt ? 'Done' : 'Pending'}</span>
        <button class="btn btn-sm" onclick="openEntry(${m.id})">${cnt ? 'Edit' : 'Enter'}</button>
      </div>
    </div>`;
      }
      html += `</div>`;
      el.innerHTML = html;
    }

    async function addMatch() {
      const t = prompt('Teams (e.g. CSK vs MI):');
      if (!t || !t.trim()) return;
      const d = prompt('Date (e.g. May 25, Sun):') || '';
      const v = prompt('Venue (e.g. Chennai):') || '';
      const nid = Math.max(...S.matches.map(m => m.id)) + 1;
      const newMatch = { id: nid, t: t.trim(), d: d.trim(), v: v.trim() };

      // Optimistic update
      S.matches.push(newMatch);
      rMatches();

      if (supabaseClient && SUPABASE_URL !== 'YOUR_SUPABASE_URL') {
        const { error } = await supabaseClient.from('custom_matches').insert([{
          id: newMatch.id, teams: newMatch.t, match_date: newMatch.d, venue: newMatch.v
        }]);
        if (error) alert("Could not save match to database: " + error.message);
      }
    }

    function openEntry(mid) { S.sel = mid; S.view = 'entry'; render(); }

    function rEntry() {
      const el = document.getElementById('v-entry');
      const m = S.matches.find(x => x.id === S.sel);
      if (!m) { el.innerHTML = ''; return; }
      if (!S.players.length) {
        el.innerHTML = `<button class="back" onclick="goBack()">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path></svg>
      Back
    </button><div class="empty">Add players first in the Players tab.</div>`; return;
      }
      const me = matchEntries(m.id);
      const rows = S.players.map((p, i) => {
        const e = me[p] || {};
        return `<div class="entry-row">
      <div class="ep">${escH(p)}</div>
      <div class="eig"><div class="el">Rank</div><input type="number" min="1" step="1" id="er_${i}" value="${e.rank != null ? e.rank : ''}"></div>
      <div class="eig"><div class="el">Points</div><input type="number" min="0" step="1" id="ep_${i}" value="${e.points != null ? e.points : ''}"></div>
    </div>`;
      }).join('');
      el.innerHTML = `<button class="back" onclick="goBack()">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path></svg>
    Back to matches
  </button>
  <div class="card" style="margin-bottom:1.5rem">
    <div style="font-size:12px;font-weight:600;color:var(--color-accent);text-transform:uppercase;letter-spacing:0.05em">Match ${m.id}</div>
    <div style="font-size:20px;font-weight:600;margin:6px 0;letter-spacing:-0.01em">${escH(m.t)}</div>
    <div style="font-size:13px;color:var(--color-text-secondary)">${escH(m.d)} · ${escH(m.v)}</div>
  </div>
  ${rows}
  <div style="display:flex;gap:8px;margin-top:1rem">
    <button class="btn btn-a" onclick="saveEntry()">Save scores</button>
    <button class="btn" onclick="goBack()">Cancel</button>
  </div>`;
    }

    async function saveEntry() {
      const m = S.matches.find(x => x.id === S.sel);
      if (!m) return;

      const prevStats = computeAdvancedStats();
      const upserts = [];
      const deletes = [];

      S.players.forEach((p, i) => {
        const rEl = document.getElementById('er_' + i);
        const pEl = document.getElementById('ep_' + i);
        const rank = rEl ? rEl.value.trim() : '';
        const pts = pEl ? pEl.value.trim() : '';
        const k = eKey(m.id, p);
        if (rank !== '' || pts !== '') {
          const rVal = rank === '' ? null : parseInt(rank, 10);
          const pVal = pts === '' ? null : Math.round(Number(pts));
          S.entries[k] = { rank: rVal, points: pVal };
          upserts.push({ match_id: m.id, player_name: p, rank: rVal, points: pVal });
        } else {
          delete S.entries[k];
          deletes.push(p);
        }
      });

      // Optimistic update
      goBack();
      const newStats = computeAdvancedStats();
      const xpChanges = [];
      for (const p of S.players) {
        const before = prevStats[p]?.lastXP || 0;
        const after = newStats[p]?.lastXP || 0;
        const delta = after - before;
        if (delta !== 0) {
          xpChanges.push({ player: p, delta, leveled: prevStats[p]?.level !== newStats[p]?.level, nextLevel: newStats[p]?.level });
        }
      }

      let showRewards = true;
      if (supabaseClient && SUPABASE_URL !== 'YOUR_SUPABASE_URL') {
        let hasError = false;
        if (upserts.length > 0) {
          const { error } = await supabaseClient.from('entries').upsert(upserts);
          if (error) {
            hasError = true;
            showRewards = false;
            alert("Could not save scores to database: " + error.message);
          }
        }
        if (!hasError) {
          for (const p of deletes) {
            await supabaseClient.from('entries').delete().match({ match_id: m.id, player_name: p });
          }
        }
      }

      if (showRewards && xpChanges.length > 0) {
        xpChanges.forEach((item, index) => {
          setTimeout(() => {
            showXPFloat(`${item.player}: ${item.delta > 0 ? '+' + item.delta : item.delta} XP`, item.delta > 0);
            if (item.leveled) showLevelUp(item.player, item.nextLevel);
          }, index * 260);
        });
      }
    }

    function goBack() { S.sel = null; S.view = 'matches'; render(); }

    function rPlayers() {
      const el = document.getElementById('v-players');
      const { data } = leaderboard();
      let rows = '';
      if (S.players.length) {
        rows = S.players.map((p, i) => {
          const d = data[p] || { n: 0, rs: 0, ps: 0 };
          const meta = d.n ? `${d.n} match${d.n !== 1 ? 'es' : ''} · rank sum: ${d.rs} · pts: ${d.ps}` : `No scores yet`;
          return `<div class="pl-row">
        <div>
          <div class="pl-name">${escH(p)}</div>
          <div class="pl-meta">${meta}</div>
        </div>
        <button class="del" onclick="delPlayer(${i})" title="Remove">×</button>
      </div>`;
        }).join('');
      } else {
        rows = `<div class="empty">No players yet. Add your first player below.</div>`;
      }
      el.innerHTML = `<div class="card">
    <div class="sec-label">Players (${S.players.length})</div>
    ${rows}
    <div class="add-row">
      <input type="text" id="npi" placeholder="Enter player name" onkeydown="if(event.key==='Enter')addPlayer()">
      <button class="btn btn-a" onclick="addPlayer()">Add</button>
    </div>
  </div>`;
    }

    async function addPlayer() {
      const inp = document.getElementById('npi');
      const name = inp ? inp.value.trim() : '';
      if (!name) return;
      if (S.players.includes(name)) { alert('Player already exists!'); return; }

      S.players.push(name);
      inp.value = '';
      rPlayers();

      if (supabaseClient && SUPABASE_URL !== 'YOUR_SUPABASE_URL') {
        const { error } = await supabaseClient.from('players').insert([{ name }]);
        if (error) alert("Could not save player to database: " + error.message);
      }
    }

    async function delPlayer(i) {
      const name = S.players[i];
      if (!confirm(`Remove "${name}"? Their scores will also be deleted.`)) return;

      S.players.splice(i, 1);
      const sep = ':::';
      for (const k of Object.keys(S.entries)) {
        const idx = k.indexOf(sep);
        if (idx >= 0 && k.slice(idx + 3) === name) delete S.entries[k];
      }
      rPlayers();

      if (supabaseClient && SUPABASE_URL !== 'YOUR_SUPABASE_URL') {
        const { error } = await supabaseClient.from('players').delete().eq('name', name);
        if (error) alert("Could not delete player from database: " + error.message);
      }
    }

    function rAnalytics() {
      const el = document.getElementById('v-analytics');
      const data = computeAdvancedStats();
      const sorted = Object.entries(data).sort((a, b) => b[1].score - a[1].score);

      const podium = sorted.slice(0, 3);
      const podiumHTML = `
<div class="arena">
  <div class="podium-side left">
    ${podiumCard(podium[1], 2)}
  </div>
  <div class="podium-main">
    ${podiumCard(podium[0], 1, true)}
    <div class="crown">👑</div>
  </div>
  <div class="podium-side right">
    ${podiumCard(podium[2], 3)}
  </div>
</div>
`;

      let html = podiumHTML + `

<div class="card">
  <div class="sec-label">Performance Trend (All Players)</div>
  <canvas id="evolutionChart"></canvas>
</div>

<div class="card">
  <div class="sec-label">Points Comparison</div>
  <canvas id="pointsChart"></canvas>
</div>

<div class="card">
  <div class="sec-label">Consistency Comparison</div>
  <canvas id="consistencyChart"></canvas>
</div>

<div class="card">
  <div class="sec-label">Wins & Podiums</div>
  <canvas id="winPodiumChart"></canvas>
</div>

<div class="card">
  <div class="sec-label">Rank vs Points (Skill Map)</div>
  <canvas id="scatterChart"></canvas>
</div>

<div class="card">
  <div class="sec-label">XP Distribution</div>
  <canvas id="xpChart"></canvas>
</div>

<div class="card">
  <div class="sec-label">🔮 Next Match Prediction</div>
  <div id="predictionBox"></div>
</div>

<div class="card">
  <div class="sec-label">🔥 Performance Heatmap</div>
  <div id="heatmap"></div>
</div>`;

      el.innerHTML = html;

      const allPlayers = sorted.map(([name]) => name);
      const labels = allPlayers;
      const avgPoints = sorted.map(x => x[1].avgP);
      const podiums = sorted.map(x => x[1].podiumCount);
      const playedMatches = [...new Set(
        Object.keys(S.entries).map(k => Number(k.split(':::')[0]))
      )].sort((a, b) => a - b);
      const matchLabels = playedMatches.map(m => `M${m}`);
      const maxScore = Math.max(...sorted.map(([_, d]) => d.score), 0);
      const trendSets = sorted.map(([name, d], idx) => {
        const values = [];
        playedMatches.forEach(mid => {
          const entry = S.entries[eKey(mid, name)];
          values.push(entry && entry.points != null ? Number(entry.points) : null);
        });
        const strong = d.score > maxScore * 0.6;
        const hue = idx * 25;
        const alpha = strong ? 1 : 0.25;
        return {
          label: name,
          data: values,
          borderColor: `hsla(${hue}, 80%, 60%, ${alpha})`,
          backgroundColor: `hsla(${hue}, 80%, 60%, ${alpha * 0.25})`,
          borderWidth: strong ? 3 : 1,
          tension: 0.35,
          spanGaps: true
        };
      });

      new Chart(document.getElementById('evolutionChart'), {
        type: 'line',
        data: { labels: matchLabels, datasets: trendSets },
        options: {
          plugins: {
            legend: {
              display: true,
              labels: {
                color: '#aaa',
                filter: (item, chart) => true
              }
            }
          }
        }
      });

      new Chart(document.getElementById('pointsChart'), {
        type: 'bar',
        data: {
          labels,
          datasets: [
            { label: 'Total Points', data: sorted.map(x => x[1].ps), backgroundColor: 'rgba(59, 130, 246, 0.75)' },
            { label: 'Avg Points', data: sorted.map(x => x[1].avgP), backgroundColor: 'rgba(16, 185, 129, 0.75)' }
          ]
        }
      });

      new Chart(document.getElementById('consistencyChart'), {
        type: 'bar',
        data: {
          labels,
          datasets: [{ label: 'Consistency', data: sorted.map(x => x[1].consistency), backgroundColor: 'rgba(249, 115, 22, 0.85)' }]
        }
      });

      new Chart(document.getElementById('winPodiumChart'), {
        type: 'bar',
        data: {
          labels,
          datasets: [
            { label: 'Wins', data: sorted.map(x => x[1].winCount), backgroundColor: 'rgba(59, 130, 246, 0.75)' },
            { label: 'Podiums', data: sorted.map(x => x[1].podiumCount), backgroundColor: 'rgba(16, 185, 129, 0.75)' }
          ]
        }
      });

      new Chart(document.getElementById('scatterChart'), {
        type: 'scatter',
        data: {
          datasets: [{
            label: 'Players',
            data: sorted.map(([name, d]) => ({
              x: d.avgP,
              y: d.avgR === Infinity ? 0 : d.avgR,
              label: name
            })),
            backgroundColor: 'rgba(255, 99, 132, 0.75)'
          }]
        },
        options: {
          plugins: {
            tooltip: {
              callbacks: {
                label: ctx => `${ctx.raw.label}: (${ctx.raw.x.toFixed(1)}, ${ctx.raw.y.toFixed(1)})`
              }
            }
          },
          scales: {
            x: { title: { display: true, text: 'Avg Points' } },
            y: { title: { display: true, text: 'Avg Rank' }, reverse: true }
          }
        }
      });

      new Chart(document.getElementById('xpChart'), {
        type: 'bar',
        data: {
          labels,
          datasets: [{ label: 'XP', data: sorted.map(x => x[1].xp), backgroundColor: 'rgba(79, 70, 229, 0.75)' }]
        }
      });

      const predictions = predictNextMatch(sorted);
      const predHTML = predictions.slice(0, 5).map((p, i) => `
        <div style="display:flex;justify-content:space-between;padding:6px 0;">
          <span>${i + 1}. ${p.name}</span>
          <span>🔥 ${p.score.toFixed(0)}</span>
        </div>
      `).join('');
      document.getElementById('predictionBox').innerHTML = predHTML;
      renderHeatmap(sorted, playedMatches);

      if (window.gsap) {
        gsap.from('.card-podium', {
          y: 50,
          opacity: 0,
          stagger: 0.15,
          duration: 0.6,
          ease: 'power3.out',
        });
      }
    }

    function predictNextMatch(sorted) {
      return sorted.map(([name, d]) => {
        const formBoost = d.form || d.avgP;
        const consistencyBoost = d.consistency * 100;
        const score = (0.5 * d.avgP) + (0.3 * formBoost) + (0.2 * consistencyBoost);
        return { name, score };
      }).sort((a, b) => b.score - a.score);
    }

    function renderHeatmap(sorted, playedMatches) {
      const container = document.getElementById('heatmap');
      let html = `<div class="heatmap-grid">`;
      html += `<div class="heatmap-cell head"></div>`;
      playedMatches.forEach(m => {
        html += `<div class="heatmap-cell head">M${m}</div>`;
      });
      sorted.forEach(([name]) => {
        html += `<div class="heatmap-cell player">${escH(name)}</div>`;
        playedMatches.forEach(mid => {
          const entry = S.entries[eKey(mid, name)];
          const val = entry && entry.points != null ? Number(entry.points) : null;
          let color = '#111';
          if (val !== null) {
            if (val > 850) color = '#16a34a';
            else if (val > 700) color = '#65a30d';
            else if (val > 600) color = '#ca8a04';
            else color = '#dc2626';
          }
          html += `<div class="heatmap-cell" style="background:${color};">${val !== null ? Math.round(val) : '-'}</div>`;
        });
      });
      html += `</div>`;
      container.innerHTML = html;
    }

    document.querySelectorAll('.tab').forEach(t => {
      t.addEventListener('click', () => { S.view = t.dataset.v; render(); });
    });

    init();
  </script>
</body>

</html>
